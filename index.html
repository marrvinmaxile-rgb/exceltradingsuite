<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel Trading Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .glass { background: rgba(255,255,255,0.07); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.1); }
        .ticker { animation: ticker 30s linear infinite; }
        @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .price-up { animation: priceUp 0.6s; }
        .price-down { animation: priceDown 0.6s; }
        @keyframes priceUp { 0% { color: #22c55e; transform: scale(1.08); } }
        @keyframes priceDown { 0% { color: #ef4444; transform: scale(0.92); } }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100">

    <!-- AUTH SCREEN -->
    <div id="auth-screen" class="min-h-screen flex items-center justify-center bg-gradient-to-br from-zinc-900 to-black">
        <div class="max-w-md w-full p-8">
            <div class="text-center mb-10">
                <div class="inline-flex items-center gap-3 mb-4">
                    <div class="w-14 h-14 bg-gradient-to-br from-blue-500 to-emerald-500 rounded-3xl flex items-center justify-center text-4xl font-bold">E</div>
                    <span class="text-4xl font-bold tracking-tighter">Excel Trading Suite</span>
                </div>
                <p class="text-emerald-400">Demo Trading • $1,000,000</p>
            </div>

            <div class="flex bg-zinc-900 rounded-3xl p-1 mb-8">
                <button onclick="switchAuthTab(0)" id="login-tab" class="flex-1 py-4 rounded-3xl font-semibold bg-zinc-800">Login</button>
                <button onclick="switchAuthTab(1)" id="register-tab" class="flex-1 py-4 rounded-3xl font-semibold">Register</button>
            </div>

            <div id="login-form">
                <input id="login-email" type="email" placeholder="Email" class="w-full mb-4 bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4">
                <input id="login-pass" type="password" placeholder="Password" class="w-full mb-6 bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4">
                <button onclick="login()" class="w-full py-5 bg-gradient-to-r from-blue-500 to-emerald-500 rounded-3xl font-bold text-xl">MASUK</button>
            </div>

            <div id="register-form" class="hidden">
                <input id="reg-name" type="text" placeholder="Nama Lengkap" class="w-full mb-4 bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4">
                <input id="reg-email" type="email" placeholder="Email" class="w-full mb-4 bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4">
                <input id="reg-pass" type="password" placeholder="Password" class="w-full mb-6 bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4">
                <button onclick="register()" class="w-full py-5 bg-gradient-to-r from-emerald-500 to-cyan-500 rounded-3xl font-bold text-xl">BUAT AKUN</button>
            </div>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" class="hidden flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <div class="w-72 bg-zinc-900 border-r border-zinc-800 flex flex-col">
            <div class="p-6 border-b flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-emerald-500 rounded-3xl flex items-center justify-center text-3xl font-bold">E</div>
                <span class="text-3xl font-bold">Excel</span>
            </div>
            <nav class="flex-1 p-4 space-y-1">
                <a onclick="switchTab(0)" class="tab-btn active flex items-center gap-3 px-4 py-3 rounded-2xl"><i class="fa-solid fa-chart-line"></i> Market</a>
                <a onclick="switchTab(1)" class="tab-btn flex items-center gap-3 px-4 py-3 rounded-2xl"><i class="fa-solid fa-wallet"></i> Portfolio</a>
                <a onclick="switchTab(2)" class="tab-btn flex items-center gap-3 px-4 py-3 rounded-2xl"><i class="fa-solid fa-list-check"></i> Positions</a>
                <a onclick="switchTab(3)" class="tab-btn flex items-center gap-3 px-4 py-3 rounded-2xl"><i class="fa-solid fa-history"></i> History</a>
            </nav>
            <div class="p-4 space-y-2">
                <button onclick="showDepositModal()" class="w-full py-3 bg-emerald-500 text-black font-bold rounded-2xl">Deposit</button>
                <button onclick="showWithdrawModal()" class="w-full py-3 bg-zinc-700 hover:bg-zinc-600 rounded-2xl">Withdraw</button>
            </div>
        </div>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col">
            <!-- Ticker -->
            <div class="h-9 bg-zinc-900 border-b border-zinc-700 overflow-hidden text-sm">
                <div id="live-ticker" class="ticker flex items-center h-full"></div>
            </div>

            <div class="h-16 bg-zinc-900 border-b border-zinc-800 px-6 flex items-center justify-between">
                <div id="asset-header" class="flex gap-8"></div>
                <button onclick="logout()" class="text-red-400">Logout</button>
            </div>

            <div class="flex-1 overflow-auto p-6" id="main-content">
                <!-- Market Tab -->
                <div id="tab-market">
                    <div class="grid grid-cols-12 gap-6">
                        <div class="col-span-8">
                            <div class="glass rounded-3xl p-6">
                                <div class="flex justify-between mb-6">
                                    <div>
                                        <div id="symbol" class="text-4xl font-bold">BTC/USD</div>
                                        <div id="price" class="text-6xl font-mono font-semibold">67842.35</div>
                                        <div id="change" class="text-emerald-400 text-xl">+2.84%</div>
                                    </div>
                                </div>
                                <div class="h-96"><canvas id="mainChart"></canvas></div>
                            </div>
                        </div>

                        <!-- Order Panel -->
                        <div class="col-span-4">
                            <div class="glass rounded-3xl p-6">
                                <div class="flex mb-6">
                                    <button onclick="setOrderType(0)" id="buy-tab" class="flex-1 py-4 bg-emerald-500 text-black font-bold rounded-2xl">BUY</button>
                                    <button onclick="setOrderType(1)" id="sell-tab" class="flex-1 py-4 font-bold rounded-2xl">SELL</button>
                                </div>
                                <input id="amount" value="0.15" class="w-full text-center text-4xl font-mono bg-zinc-900 border border-zinc-700 rounded-2xl py-6">
                                <button onclick="placeOrder()" class="mt-8 w-full py-6 text-xl font-bold bg-emerald-500 hover:bg-emerald-600 rounded-3xl">PLACE ORDER</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Portfolio -->
                <div id="tab-portfolio" class="hidden">
                    <h2 class="text-3xl font-bold mb-6">Portfolio</h2>
                    <div class="glass rounded-3xl p-8">
                        <div class="text-zinc-400">Total Balance (USDT)</div>
                        <div id="total-balance" class="text-5xl font-mono font-bold text-emerald-400">$1,000,000</div>
                    </div>
                </div>

                <!-- Positions -->
                <div id="tab-positions" class="hidden">
                    <h2 class="text-3xl font-bold mb-6">Open Positions</h2>
                    <div id="positions-container" class="space-y-4"></div>
                </div>

                <!-- History -->
                <div id="tab-history" class="hidden">
                    <h2 class="text-3xl font-bold mb-6">Trade History</h2>
                    <table class="w-full text-sm font-mono" id="history-table">
                        <thead><tr class="border-b border-zinc-700"><th class="text-left py-4">Waktu</th><th>Pair</th><th>Type</th><th>Amount</th><th>Price</th><th>Total</th></tr></thead>
                        <tbody id="history-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Deposit & Withdraw Modal -->
    <div id="deposit-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
        <div class="glass rounded-3xl p-8 w-full max-w-md">
            <h2 class="text-2xl font-bold mb-6">Deposit</h2>
            <input id="deposit-amount" type="number" value="100" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4 text-2xl mb-6">
            <button onclick="processDeposit()" class="w-full py-5 bg-emerald-500 text-black font-bold rounded-3xl">Konfirmasi Deposit</button>
            <button onclick="hideDepositModal()" class="w-full py-3 mt-3 text-zinc-400">Batal</button>
        </div>
    </div>

    <div id="withdraw-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
        <div class="glass rounded-3xl p-8 w-full max-w-md">
            <h2 class="text-2xl font-bold mb-6">Withdraw</h2>
            <input id="withdraw-amount" type="number" value="50" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4 text-2xl mb-6">
            <button onclick="processWithdraw()" class="w-full py-5 bg-red-500 text-white font-bold rounded-3xl">Konfirmasi Withdraw</button>
            <button onclick="hideWithdrawModal()" class="w-full py-3 mt-3 text-zinc-400">Batal</button>
        </div>
    </div>

    <script>
        let usdt = 1000000;
        let positions = [];
        let history = [];
        let currentPrice = 67842.35;
        let isBuy = true;
        let chart;

        function switchAuthTab(n) {
            document.getElementById('login-form').classList.toggle('hidden', n !== 0);
            document.getElementById('register-form').classList.toggle('hidden', n !== 1);
        }

        function register() {
            const name = document.getElementById('reg-name').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const pass = document.getElementById('reg-pass').value.trim();
            if (!name || !email || !pass) return alert("Semua kolom harus diisi!");
            localStorage.setItem('excelUser', JSON.stringify({name, email, password: pass}));
            alert("✅ Akun berhasil dibuat!");
            switchAuthTab(0);
        }

        function login() {
            const email = document.getElementById('login-email').value.trim();
            const pass = document.getElementById('login-pass').value.trim();
            const saved = localStorage.getItem('excelUser');
            if (!saved) return alert("Belum ada akun. Silakan register.");
            const user = JSON.parse(saved);
            if (user.email === email && user.password === pass) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                initDashboard();
            } else {
                alert("Email atau password salah!");
            }
        }

        function initDashboard() {
            initTicker();
            initHeader();
            initChart();
            updateBalance();
            simulatePriceMovement();
        }

        function initTicker() {
            document.getElementById('live-ticker').innerHTML = `BTC 67,842 +2.84% &nbsp;&nbsp; ETH 3,412 +1.45% &nbsp;&nbsp; SOL 149 -0.8% &nbsp;&nbsp; `;
        }

        function initHeader() {
            document.getElementById('asset-header').innerHTML = `<div class="font-semibold">BTC/USD</div>`;
        }

        function initChart() {
            chart = new Chart(document.getElementById('mainChart'), {
                type: 'line',
                data: { labels: Array(30).fill(0).map((_,i)=>i), datasets: [{ data: Array(30).fill(67800).map(v => v + Math.random()*1200), borderColor: '#10b981', tension: 0.4 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        function updateBalance() {
            document.getElementById('total-balance').textContent = '$' + usdt.toLocaleString();
        }

        function setOrderType(type) {
            isBuy = type === 0;
            document.getElementById('buy-tab').classList.toggle('bg-emerald-500', isBuy);
            document.getElementById('sell-tab').classList.toggle('bg-red-500', !isBuy);
        }

        function placeOrder() {
            const amount = parseFloat(document.getElementById('amount').value);
            if (!amount) return alert("Masukkan jumlah!");

            const total = amount * currentPrice;
            if (isBuy && total > usdt) return alert("Saldo tidak cukup!");

            if (isBuy) {
                usdt -= total;
                positions.push({symbol:"BTC", amount, entryPrice: currentPrice});
            } else {
                usdt += total;
            }

            history.unshift({
                time: new Date().toLocaleTimeString(),
                pair: "BTC/USD",
                type: isBuy ? "BUY" : "SELL",
                amount: amount,
                price: currentPrice,
                total: total
            });

            updateBalance();
            renderPositions();
            renderHistory();
            alert(`✅ ${isBuy ? 'BUY' : 'SELL'} berhasil!`);
        }

        function renderPositions() {
            const container = document.getElementById('positions-container');
            container.innerHTML = positions.map(pos => {
                const pnl = (currentPrice - pos.entryPrice) * pos.amount;
                return `<div class="glass rounded-3xl p-6 flex justify-between"><div>BTC Long • ${pos.amount}</div><div class="${pnl>=0?'text-emerald-400':'text-red-400'}">$${pnl.toFixed(2)}</div></div>`;
            }).join('');
        }

        function renderHistory() {
            const tbody = document.getElementById('history-body');
            tbody.innerHTML = history.map(h => `
                <tr class="border-b"><td>${h.time}</td><td>${h.pair}</td><td class="${h.type==='BUY'?'text-emerald-400':'text-red-400'}">${h.type}</td><td>${h.amount}</td><td>${h.price}</td><td>$${h.total}</td></tr>
            `).join('');
        }

        function simulatePriceMovement() {
            setInterval(() => {
                currentPrice += (Math.random() * 160 - 80);
                document.getElementById('price').textContent = currentPrice.toFixed(2);
                renderPositions();
            }, 2800);
        }

        function switchTab(n) {
            document.querySelectorAll('#main-content > div').forEach(d => d.classList.add('hidden'));
            document.getElementById(['tab-market','tab-portfolio','tab-positions','tab-history'][n]).classList.remove('hidden');
        }

        function showDepositModal() { document.getElementById('deposit-modal').classList.remove('hidden'); }
        function hideDepositModal() { document.getElementById('deposit-modal').classList.add('hidden'); }
        function showWithdrawModal() { document.getElementById('withdraw-modal').classList.remove('hidden'); }
        function hideWithdrawModal() { document.getElementById('withdraw-modal').classList.add('hidden'); }

        function processDeposit() {
            const amt = parseFloat(document.getElementById('deposit-amount').value);
            if (amt > 0) {
                usdt += amt;
                alert(`✅ Deposit $${amt} berhasil!`);
                updateBalance();
                hideDepositModal();
            }
        }

        function processWithdraw() {
            const amt = parseFloat(document.getElementById('withdraw-amount').value);
            if (amt > 0 && amt <= usdt) {
                usdt -= amt;
                alert(`✅ Withdraw $${amt} sedang diproses.`);
                updateBalance();
                hideWithdrawModal();
            } else {
                alert("Saldo tidak cukup!");
            }
        }

        function logout() {
            if (confirm("Keluar?")) location.reload();
        }

        window.onload = () => {};
    </script>
</body>
</html>
