<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel Trading Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .glass { background: rgba(255,255,255,0.06); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.1); }
        .ticker { animation: ticker 25s linear infinite; }
        @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .price-up { animation: priceUp 0.8s; }
        .price-down { animation: priceDown 0.8s; }
        @keyframes priceUp { 0% { color: #22c55e; transform: scale(1.08); } }
        @keyframes priceDown { 0% { color: #ef4444; transform: scale(0.92); } }
        .glow-green { box-shadow: 0 0 15px rgba(34, 197, 94, 0.3); }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100">

    <!-- AUTH SCREEN -->
    <div id="auth-screen" class="min-h-screen flex items-center justify-center bg-gradient-to-br from-zinc-900 via-black to-zinc-950">
        <div class="max-w-md w-full p-8">
            <div class="text-center mb-10">
                <div class="inline-flex items-center gap-3 mb-4">
                    <div class="w-14 h-14 bg-gradient-to-br from-blue-500 via-emerald-500 to-cyan-400 rounded-3xl flex items-center justify-center text-4xl font-bold shadow-xl">E</div>
                    <span class="text-4xl font-bold tracking-tighter">Excel Trading Suite</span>
                </div>
                <p class="text-emerald-400 text-lg">Professional Demo Trading Platform</p>
            </div>

            <div class="flex bg-zinc-900 rounded-3xl p-1 mb-8">
                <button onclick="switchAuthTab(0)" id="login-tab" class="flex-1 py-4 rounded-3xl font-semibold bg-zinc-800">Login</button>
                <button onclick="switchAuthTab(1)" id="register-tab" class="flex-1 py-4 rounded-3xl font-semibold">Register</button>
            </div>

            <!-- Login -->
            <div id="login-form">
                <input id="login-email" type="email" placeholder="Email" class="w-full mb-4 bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4">
                <input id="login-pass" type="password" placeholder="Password" class="w-full mb-4 bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4">
                <button onclick="showForgotPassword()" class="text-blue-400 text-sm mb-6">Lupa Password?</button>
                <button onclick="login()" class="w-full py-5 bg-gradient-to-r from-blue-500 to-emerald-500 rounded-3xl font-bold text-xl">MASUK</button>
            </div>

            <!-- Register -->
            <div id="register-form" class="hidden">
                <input id="reg-name" type="text" placeholder="Nama Lengkap" class="w-full mb-4 bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4">
                <input id="reg-email" type="email" placeholder="Email" class="w-full mb-4 bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4">
                <input id="reg-pass" type="password" placeholder="Password" class="w-full mb-6 bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4">
                <button onclick="register()" class="w-full py-5 bg-gradient-to-r from-emerald-500 to-cyan-500 rounded-3xl font-bold text-xl">BUAT AKUN</button>
            </div>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" class="hidden flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <div class="w-72 bg-zinc-900 border-r border-zinc-800 flex flex-col">
            <div class="p-6 border-b flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-emerald-500 rounded-3xl flex items-center justify-center text-3xl font-bold shadow-inner">E</div>
                <span class="text-3xl font-bold tracking-tight">Excel</span>
            </div>
            <nav class="flex-1 p-4 space-y-1">
                <a onclick="switchTab(0)" class="tab-btn active flex items-center gap-3 px-4 py-3 rounded-2xl"><i class="fa-solid fa-chart-line"></i> Market</a>
                <a onclick="switchTab(1)" class="tab-btn flex items-center gap-3 px-4 py-3 rounded-2xl"><i class="fa-solid fa-wallet"></i> Portfolio</a>
                <a onclick="switchTab(2)" class="tab-btn flex items-center gap-3 px-4 py-3 rounded-2xl"><i class="fa-solid fa-list-check"></i> Positions</a>
                <a onclick="switchTab(3)" class="tab-btn flex items-center gap-3 px-4 py-3 rounded-2xl"><i class="fa-solid fa-history"></i> History</a>
            </nav>
        </div>

        <!-- Main Area -->
        <div class="flex-1 flex flex-col">
            <!-- Top Ticker -->
            <div class="h-10 bg-zinc-900 border-b border-zinc-700 overflow-hidden">
                <div id="live-ticker" class="ticker flex items-center h-full text-sm whitespace-nowrap"></div>
            </div>

            <!-- Header -->
            <div class="h-16 bg-zinc-900 border-b border-zinc-800 px-6 flex items-center justify-between">
                <div id="asset-header" class="flex items-center gap-8"></div>
                <div class="flex items-center gap-6">
                    <span id="market-status" class="text-emerald-400 text-sm flex items-center gap-2"><i class="fa-solid fa-circle text-xs"></i> MARKET OPEN</span>
                    <button onclick="showNotifications()" class="text-xl"><i class="fa-solid fa-bell"></i></button>
                    <button onclick="logout()" class="text-red-400 hover:text-red-500">Logout</button>
                </div>
            </div>

            <div class="flex-1 overflow-auto p-6" id="main-content">
                <!-- Market Tab -->
                <div id="tab-market">
                    <div class="grid grid-cols-12 gap-6">
                        <!-- Chart -->
                        <div class="col-span-8">
                            <div class="glass rounded-3xl p-6 glow-green">
                                <div class="flex justify-between mb-6">
                                    <div>
                                        <div id="symbol" class="text-4xl font-bold">BTC/USD</div>
                                        <div id="price" class="text-6xl font-mono font-semibold">67,842.35</div>
                                        <div id="change" class="text-emerald-400 text-xl">+1,874.20 (+2.84%)</div>
                                    </div>
                                </div>
                                <div class="h-96">
                                    <canvas id="mainChart"></canvas>
                                </div>
                            </div>
                        </div>

                        <!-- Order Panel -->
                        <div class="col-span-4">
                            <div class="glass rounded-3xl p-6">
                                <div class="flex mb-6 border-b border-zinc-700 pb-4">
                                    <button onclick="setOrderType(0)" id="buy-tab" class="flex-1 py-4 bg-emerald-500 text-black font-bold rounded-2xl">BUY</button>
                                    <button onclick="setOrderType(1)" id="sell-tab" class="flex-1 py-4 font-bold rounded-2xl">SELL</button>
                                </div>
                                <input id="amount" value="0.15" class="w-full text-center text-4xl font-mono bg-zinc-900 border border-zinc-700 rounded-2xl py-6 mb-6">
                                <button onclick="placeOrder()" class="w-full py-6 text-xl font-bold bg-gradient-to-r from-emerald-500 to-teal-500 rounded-3xl">PLACE ORDER</button>
                            </div>
                        </div>

                        <!-- Order Book -->
                        <div class="col-span-12">
                            <div class="glass rounded-3xl p-6">
                                <h3 class="font-semibold mb-4 flex items-center gap-2"><i class="fa-solid fa-book"></i> Order Book</h3>
                                <div class="grid grid-cols-2 gap-8" id="order-book"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Portfolio Tab -->
                <div id="tab-portfolio" class="hidden">
                    <h2 class="text-3xl font-bold mb-6">Portfolio Overview</h2>
                    <div class="grid grid-cols-3 gap-6">
                        <div class="glass rounded-3xl p-8">
                            <div class="text-zinc-400">Total Balance</div>
                            <div id="total-balance" class="text-5xl font-mono font-bold text-emerald-400">$1,000,000</div>
                        </div>
                    </div>
                    <canvas id="pieChart" class="h-96 mt-10"></canvas>
                </div>

                <!-- Positions -->
                <div id="tab-positions" class="hidden">
                    <h2 class="text-3xl font-bold mb-6">Open Positions</h2>
                    <div id="positions-container" class="space-y-4"></div>
                </div>

                <!-- History -->
                <div id="tab-history" class="hidden">
                    <h2 class="text-3xl font-bold mb-6">Trade History</h2>
                    <table class="w-full font-mono text-sm" id="history-table">
                        <thead><tr class="border-b"><th class="py-4 text-left">Waktu</th><th>Pair</th><th>Type</th><th>Amount</th><th>Price</th><th>Total</th></tr></thead>
                        <tbody id="history-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let balance = 1000000;
        let usdt = 998500;
        let positions = [];
        let history = [];
        let currentPrice = 67842.35;
        let isBuy = true;
        let chart;
        let currentUser = null;

        function switchAuthTab(n) {
            document.getElementById('login-form').classList.toggle('hidden', n !== 0);
            document.getElementById('register-form').classList.toggle('hidden', n !== 1);
        }

        function register() {
            const name = document.getElementById('reg-name').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const pass = document.getElementById('reg-pass').value.trim();
            if (!name || !email || !pass) return alert("Semua field harus diisi!");
            
            localStorage.setItem('excelUser', JSON.stringify({name, email, password: pass}));
            alert("✅ Akun berhasil dibuat! Silakan login.");
            switchAuthTab(0);
        }

        function login() {
            const email = document.getElementById('login-email').value.trim();
            const pass = document.getElementById('login-pass').value.trim();
            const saved = localStorage.getItem('excelUser');
            
            if (!saved) return alert("Belum ada akun. Buat akun dulu.");
            
            const user = JSON.parse(saved);
            if (user.email === email && user.password === pass) {
                currentUser = user;
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                initDashboard();
            } else {
                alert("Email atau password salah!");
            }
        }

        function showForgotPassword() {
            alert("✅ Link reset password telah dikirim (Demo Mode)");
        }

        function initDashboard() {
            initLiveTicker();
            initHeader();
            initChart();
            initPieChart();
            updateBalance();
            simulatePriceMovement();
        }

        function initLiveTicker() {
            const ticker = document.getElementById('live-ticker');
            ticker.innerHTML = `
                BTC 67,842.35 <span class="text-emerald-400">+2.84%</span> &nbsp;&nbsp;&nbsp;
                ETH 3,412.80 <span class="text-emerald-400">+1.45%</span> &nbsp;&nbsp;&nbsp;
                SOL 148.92 <span class="text-red-400">-0.82%</span> &nbsp;&nbsp;&nbsp;
                AAPL 228.45 <span class="text-emerald-400">+0.94%</span>
            ` + ticker.innerHTML;
        }

        function initHeader() {
            document.getElementById('asset-header').innerHTML = `
                <div onclick="switchAsset('BTC')" class="cursor-pointer font-semibold">BTC/USD <span class="font-mono text-emerald-400">67,842</span></div>
            `;
        }

        function initChart() {
            chart = new Chart(document.getElementById('mainChart'), {
                type: 'line',
                data: {
                    labels: Array(40).fill(0).map((_,i)=>i),
                    datasets: [{ data: Array(40).fill(0).map(() => 67000 + Math.random()*2500), borderColor: '#10b981', tension: 0.4, borderWidth: 3 }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        function initPieChart() {
            new Chart(document.getElementById('pieChart'), {
                type: 'doughnut',
                data: { labels: ['USDT','BTC','ETH'], datasets: [{ data: [65,25,10], backgroundColor: ['#64748b','#f59e0b','#6366f1'] }] }
            });
        }

        function updateBalance() {
            document.getElementById('total-balance').textContent = '$' + balance.toLocaleString();
        }

        function setOrderType(type) {
            isBuy = type === 0;
            document.getElementById('buy-tab').classList.toggle('bg-emerald-500', isBuy);
            document.getElementById('sell-tab').classList.toggle('bg-red-500', !isBuy);
        }

        function placeOrder() {
            const amount = parseFloat(document.getElementById('amount').value);
            if (!amount) return alert("Masukkan jumlah!");

            const total = amount * currentPrice;
            if (isBuy && total > usdt) return alert("Saldo USDT tidak cukup!");

            if (isBuy) usdt -= total;
            else usdt += total;

            history.unshift({
                time: new Date().toLocaleTimeString(),
                pair: "BTC/USD",
                type: isBuy ? "BUY" : "SELL",
                amount: amount,
                price: currentPrice,
                total: total
            });

            updateBalance();
            alert(`✅ ${isBuy ? 'BUY' : 'SELL'} Order berhasil dieksekusi!`);
        }

        function simulatePriceMovement() {
            setInterval(() => {
                currentPrice += (Math.random() * 180 - 90);
                const priceEl = document.getElementById('price');
                priceEl.textContent = currentPrice.toFixed(2);
                priceEl.classList.add(Math.random() > 0.5 ? 'price-up' : 'price-down');
                setTimeout(() => priceEl.classList.remove('price-up', 'price-down'), 800);
            }, 2800);
        }

        function switchTab(n) {
            document.querySelectorAll('#main-content > div').forEach(d => d.classList.add('hidden'));
            document.getElementById(['tab-market','tab-portfolio','tab-positions','tab-history'][n]).classList.remove('hidden');
        }

        function showNotifications() {
            alert("🛎️ Market Update:\n• BTC sedang bullish\n• Gunakan saldo demo dengan bijak");
        }

        function logout() {
            if (confirm("Keluar dari platform?")) location.reload();
        }

        window.onload = () => {};
    </script>
</body>
</html>
